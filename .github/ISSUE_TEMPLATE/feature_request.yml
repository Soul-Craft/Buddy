name: Feature Request
description: Suggest a new feature or enhancement
labels: ["enhancement"]
body:
  - type: textarea
    id: what
    attributes:
      label: What would you like?
      description: Describe the feature or improvement you're proposing.
    validations:
      required: true

  - type: textarea
    id: why
    attributes:
      label: Why?
      description: What problem does this solve, or what experience does it improve?
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Which area does this affect?
      options:
        - New species
        - New patch type (rarity, shiny, art, etc.)
        - New skill or agent
        - Plugin behavior or UX
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you thought about?

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Screenshots, examples, or related issues.
